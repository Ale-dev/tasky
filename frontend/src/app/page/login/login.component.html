<section class="w-full h-full p-9 flex items-center">
  <div class="flex flex-col gap-36 w-96">
    <header class="flex justify-between items-center">
      <h2 class="font-bold text-2xl font-">
        TAS<mark class="px-2 text-white bg-blue-600 rounded-sm dark:bg-blue-500"
          >KY</mark
        >
      </h2>
      <div>
        <button
          type="button"
          class="inline-flex w-full justify-center gap-x-1.5 rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 ring-1 shadow-xs ring-gray-300 ring-inset hover:bg-gray-50"
        >
          Options
          <svg
            class="-mr-1 size-5 text-gray-400"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
            data-slot="icon"
          >
            <path
              fill-rule="evenodd"
              d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="flex flex-col items-center justify-center gap-5 mx-4">
      <h2 class="font-bold text-5xl">LOG IN</h2>
      <p class="font-semibold text-wrap text-gray-700">
        collaborate with your
        <span class="underline decoration-blue-700">team</span>
        in the most efficent way!
      </p>

      <form class="w-full flex flex-col">
        <input
          type="text"
          class="mb-3 text-sm rounded-lg block w-full p-2.5 border-gray-400 border-[1px]"
          placeholder="Email"
        />
        <input
          type="text"
          class="mb-3 text-sm rounded-lg block w-full p-2.5 border-gray-400 border-[1px]"
          placeholder="Password"
        />

        <a class="text-end text-blue-600">Forgot password?</a>

        <div class="inline-flex items-center justify-center w-full">
          <hr
            class="w-64 h-1 my-8 bg-gray-200 border-0 rounded-sm dark:bg-gray-700"
          />
          <div class="absolute px-4 -translate-x-1/2 bg-white left-1/2">
            Or continue with
          </div>
        </div>

        <button
          class="mb-5 text-sm rounded-lg w-full p-2.5 border-gray-400 border-[1px] flex justify-center items-center gap-2 cursor-pointer"
        >
          <svg-Google [size]="{ width: 20, height: 20 }" />
          Log in with Google
        </button>

        <button
          class="mb-5 font-normal rounded-full w-full p-2.5 bg-blue-700 text-white flex justify-center items-center gap-2 cursor-pointer"
        >
          Login
        </button>

        <p class="text-center">
          Don't have an Account?
          <a class="text-blue-600 cursor-pointer">Sign up</a>
        </p>
      </form>
    </div>
  </div>
</section>
